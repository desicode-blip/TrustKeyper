name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Validate pnpm lockfile is up-to-date
        run: pnpm install --frozen-lockfile

      - name: Typecheck (libs, Vercel /api routes, artifacts)
        run: pnpm run typecheck:deploy

      - name: Production build (same as Vercel buildCommand)
        run: pnpm run build:deploy
        env:
          COMBINED_MARKETING_DEPLOY: ${{ github.ref == 'refs/heads/staging' && '1' || '0' }}

      - name: Assert build artifacts exist
        run: |
          test -f lib/broker-tenant-onboarding/dist/index.js || (echo "broker-tenant-onboarding dist missing" && exit 1)
          test -f dist-vercel/index.html || (echo "dist-vercel index.html missing" && exit 1)
          test -f artifacts/api-server/dist/index.mjs || (echo "API server bundle missing" && exit 1)
          if [ "${COMBINED_MARKETING_DEPLOY}" = "1" ]; then
            test -f dist-vercel/_app/index.html || (echo "combined app index.html missing" && exit 1)
          fi
          echo "Build artifacts verified."
        env:
          COMBINED_MARKETING_DEPLOY: ${{ github.ref == 'refs/heads/staging' && '1' || '0' }}
