kind = "web"
previewPath = "/"
title = "TrustKeyper Onboarding"
version = "1.0.0"
id = "artifacts/trustkeyper"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21664

[services.development]
run = "pnpm --filter @workspace/trustkeyper run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trustkeyper", "run", "build" ]
publicDir = "artifacts/trustkeyper/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21664"
BASE_PATH = "/"
